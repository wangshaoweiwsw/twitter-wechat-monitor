name: Twitter Monitor → WeChat

on:
  schedule:
    - cron: '*/15 * * * *'   # every 15 minutes
  workflow_dispatch:          # manual trigger

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run monitor
        env:
          SERVERCHAN_SENDKEY: ${{ secrets.SERVERCHAN_SENDKEY }}
        run: python3 monitor.py

      - name: Commit state
        if: success()
        run: |
          git config user.name "twitter-bot"
          git config user.email "bot@twitter-monitor.local"
          git add twitter_state.json
          git diff --staged --quiet || git commit -m "update state [skip ci]"
          git push
